        // ─── SPELLCHECK ENGINE ────────────────────────────────────────────────────────
        function spellCheck(text) {
          const issues = [];
          const words = text.split(/\s+/);
          const seen = {};

          words.forEach((raw, i) => {
            const word = raw.toLowerCase().replace(/[^a-z']/g, "");
            if (!word) return;

            if (COMMON_MISSPELLINGS[word]) {
              issues.push({ type: "spelling", word: raw, suggestion: COMMON_MISSPELLINGS[word], index: i });
            }

            if (seen[word] === i - 1) {
              issues.push({ type: "repetition", word: raw, suggestion: `Remove duplicate "${raw}"`, index: i });
            }
            seen[word] = i;
          });

          const sentences = text.split(/[.!?]+/);
          sentences.forEach((s) => {
            const wc = s.trim().split(/\s+/).filter(Boolean).length;
            if (wc > 55) {
              issues.push({ type: "structure", word: "", suggestion: "Run-on sentence detected — consider breaking it up.", index: -1 });
            }
          });

          return issues;
        }

        function countWords(text) {
          return text.trim().split(/\s+/).filter(Boolean).length;
        }

        function estimatePages(wordCount) {
          return Math.max(1, Math.round(wordCount / 275));
        }

        function calcSpineWidth(wordCount) {
          const pages = estimatePages(wordCount);
          return Math.max(SPINE_MIN_WIDTH, pages * PAPER_THICKNESS_FACTOR);
        }

        // ─── SENTIMENT ENGINE ─────────────────────────────────────────────────────────
        function analyzeSentiment(text) {
          const lower = text.toLowerCase();
          const words = lower.split(/\s+/);
          let score = 0;
          words.forEach((w) => {
            if (DRAMATIC_WORDS.includes(w)) score -= 1;
            if (CALM_WORDS.includes(w)) score += 1;
          });
          const norm = Math.max(-1, Math.min(1, score / Math.max(words.length * 0.1, 1)));
          return norm;
        }

        // ─── INDEXEDDB HELPERS ────────────────────────────────────────────────────────
        async function openDB() {
          return new Promise((resolve, reject) => {
            const req = indexedDB.open("PublishReadyDB", 1);
            req.onupgradeneeded = (e) => {
              const db = e.target.result;
              if (!db.objectStoreNames.contains("projects")) {
                db.createObjectStore("projects", { keyPath: "id" });
              }
            };
            req.onsuccess = (e) => resolve(e.target.result);
            req.onerror = reject;
          });
        }

        async function saveProject(project) {
          const db = await openDB();
          return new Promise((resolve, reject) => {
            const tx = db.transaction("projects", "readwrite");
            tx.objectStore("projects").put(project);
            tx.oncomplete = resolve;
            tx.onerror = reject;
          });
        }

        async function loadAllProjects() {
          try {
            const db = await openDB();
            return new Promise((resolve, reject) => {
              const tx = db.transaction("projects", "readonly");
              const req = tx.objectStore("projects").getAll();
              req.onsuccess = (e) => resolve(e.target.result);
              req.onerror = reject;
            });
          } catch {
            return [];
          }
        }

          const typingCountRef = useRef(0);
          const saveTimerRef = useRef(null);
          const audioContextRef = useRef(null);
          const gainNodeRef = useRef(null);
          const oscillatorRef = useRef(null);

          const wordCount = countWords(content);
          const pageCount = estimatePages(wordCount);
          const spineInches = calcSpineWidth(wordCount);
          const spinePercent = (spineInches / (KDP_WIDTH_IN * 2 + spineInches)) * 100;
          const panelPercent = ((KDP_WIDTH_IN) / (KDP_WIDTH_IN * 2 + spineInches)) * 100;

          useEffect(() => {
            (async () => {
              const saved = await loadAllProjects();
              if (saved.length > 0) {
                setProjects(saved);
                const last = saved[saved.length - 1];
                setCurrentProjectId(last.id);
                setContent(last.content || "");
                setProjectTitle(last.title || "Untitled");
              }

          }, []);

          useEffect(() => {
            clearTimeout(saveTimerRef.current);
            saveTimerRef.current = setTimeout(() => {
              const proj = projects.find((p) => p.id === currentProjectId);
              if (!proj) return;
              const updated = { ...proj, content, title: projectTitle, wordCount: countWords(content), updatedAt: Date.now() };
              const next = projects.map((p) => (p.id === currentProjectId ? updated : p));
              setProjects(next);
              saveProject(updated);
            }, 1000);
          }, [content, projectTitle]);

          useEffect(() => {
            const timer = setTimeout(() => setSpellIssues(spellCheck(content)), 600);
            return () => clearTimeout(timer);

          useEffect(() => {
            const s = analyzeSentiment(content);
            setSentiment(s);
            const mood = s < -0.1 ? "dramatic" : "calm";
            if (mood !== audioState.mood) {
              const tracks = SAMPLE_TRACKS[mood];
              setCurrentTrack(tracks[Math.floor(Math.random() * tracks.length)]);

          const handleTyping = useCallback(() => {

              typingCountRef.current = 0;
            }, 3000);

          function saveSnapshot() {
            const proj = projects.find((p) => p.id === currentProjectId);
            if (!proj) return;
            const snap = { ts: Date.now(), content, wordCount };
            const history = [...(proj.history || []).slice(-19), snap];
            const updated = { ...proj, content, history, updatedAt: Date.now() };
            const next = projects.map((p) => (p.id === currentProjectId ? updated : p));
            setProjects(next);
            saveProject(updated);
            alert("Snapshot saved!");
          }

          function restoreSnapshot(snap) {
            setContent(snap.content);
            setActiveView("editor");
          }

          function newProject() {
            const id = `proj_${Date.now()}`;

            setContent("");
            setProjectTitle("New Manuscript");
            setActivePanel(null);
            setActiveView("editor");
            saveProject(proj);

          function switchProject(id) {

            setActiveView("editor");

          function handleMouseUp(e) {

              setFloatingMenu({ x: rect.left + rect.width / 2, y: rect.top - 8 });
              setSelection(sel.toString());
            } else {

            }

          function applyFormat(type) {
            if (!selection) return;
            let replacement = selection;
            if (type === "bold") replacement = `**${selection}**`;
            else if (type === "italic") replacement = `_${selection}_`;
            else if (type === "pagebreak") replacement = `\n\n--- PAGE BREAK ---\n\n${selection}`;
            else if (type === "footnote") replacement = `${selection}[^fn]`;
            setContent((c) => c.replace(selection, replacement));
            setFloatingMenu(null);
          }

          function toggleAudio() {
            if (!audioContextRef.current) {
              audioContextRef.current = new (window.AudioContext || window.webkitAudioContext)();
            }
            const ctx = audioContextRef.current;
            if (audioState.playing) {
              if (oscillatorRef.current) { try { oscillatorRef.current.stop(); } catch {} }
              setAudioState((a) => ({ ...a, playing: false }));
            } else {
              const gain = ctx.createGain();
              gain.gain.setValueAtTime(0.08 * audioState.volume, ctx.currentTime);
              gain.connect(ctx.destination);
              gainNodeRef.current = gain;
              const osc = ctx.createOscillator();
              osc.type = audioState.mood === "dramatic" ? "sawtooth" : "sine";
              osc.frequency.setValueAtTime(audioState.mood === "dramatic" ? 220 : 330, ctx.currentTime);
              osc.connect(gain);
              osc.start();
              oscillatorRef.current = osc;
              setAudioState((a) => ({ ...a, playing: true }));
            }

            },
            listItem: {
              padding: "12px 16px",
              borderBottom: isDark ? "1px solid #1e1c1a" : "1px solid #e8e4db",
              cursor: "pointer",
              display: "flex",
              justifyContent: "space-between",
              alignItems: "center",
            },
            issueBadge: {
              padding: "2px 6px",
              borderRadius: 4,
              fontSize: 10,
              fontWeight: "bold",
              textTransform: "uppercase",
            }
          };

          return (
            <div style={styles.root}>
              {activePanel === "left" && <div style={styles.overlay} onClick={() => setActivePanel(null)} />}
              <aside style={styles.leftPanel}>
                <div style={styles.panelHeader}>Manuscripts Library</div>
                <div style={{ padding: 16 }}>
                  <button 
                    onClick={newProject}
                    style={{
                      width: "100%", padding: "12px", borderRadius: 8, background: "#8b6914", color: "#fff",
                      border: "none", fontWeight: "bold", cursor: "pointer", display: "flex", gap: 8, justifyContent: "center"
                    }}
                  >
                    ➕ New Manuscript
                  </button>
                </div>
                <div style={{ flex: 1, overflowY: "auto" }}>
                  {projects.map((p) => (
                    <div 
                      key={p.id} 
                      style={{...styles.listItem, background: p.id === currentProjectId ? (isDark ? "#221e1a" : "#ebdcb9") : "none"}}
                      onClick={() => switchProject(p.id)}
                    >
                      <div>
                        <div style={{ fontWeight: 600, fontSize: 14 }}>{p.title}</div>
                        <div style={{ fontSize: 11, color: "#8a7a62", marginTop: 4 }}>{countWords(p.content || "")} words</div>
                      </div>
                      <span style={{ fontSize: 12 }}>📄</span>
                    </div>
                  ))}
                </div>
              </aside>

              {activePanel === "right" && <div style={styles.overlay} onClick={() => setActivePanel(null)} />}
              <aside style={styles.rightPanel}>
                <div style={styles.panelHeader}>Automated Quality Guard</div>
                <div style={{ flex: 1, overflowY: "auto", padding: "12px" }}>
                  <div style={{ padding: "12px", background: isDark ? "#1e1c1a" : "#fff", borderRadius: 8, marginBottom: 12, fontSize: 13 }}>
                    <strong>Continuous Verification (2026 Engine):</strong> Scanning syntax, structural pacing, and layout metrics locally.
                  </div>
                  {spellIssues.length === 0 ? (
                    <div style={{ textAlign: "center", padding: 24, color: "#8a7a62", fontSize: 14 }}>
                      ✨ Clean Sheet! No immediate spelling or pacing structural flaws detected.
                    </div>
                  ) : (
                    spellIssues.map((issue, idx) => (
                      <div 
                        key={idx} 
                        style={{
                          padding: 12, borderRadius: 8, background: isDark ? "#221310" : "#fdeeed",
                          borderLeft: "4px solid #d9534f", marginBottom: 10, fontSize: 13
                        }}
                      >
                        <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 4 }}>
                          <span style={{ fontWeight: "bold", color: "#d9534f" }}>{issue.type}</span>
                          {issue.word && <code style={{ background: "rgba(0,0,0,0.1)", padding: "1px 4px", borderRadius: 3 }}>{issue.word}</code>}
                        </div>
                        <div style={{ color: isDark ? "#e0cbd0" : "#503032" }}>{issue.suggestion}</div>
                      </div>
                    ))
                  )}

                  <div 
                    onClick={checkPremiumStatus}
                    style={{
                      marginTop: 20, padding: 16, borderRadius: 10, background: "linear-gradient(135deg, #2c1f10 0%, #151008 100%)",
                      border: "1px solid #c8a96e", cursor: "pointer", textAlign: "center"
                    }}
                  >
                    <div style={{ fontSize: 14, fontWeight: "bold", color: "#c8a96e", marginBottom: 4 }}>💡 AI Context & Pacing Expert</div>
                    <p style={{ fontSize: 11, color: "#a89880", margin: 0 }}>Deep analysis for continuity faults, anachronisms, and automated idea suggestion.</p>
                  </div>
                </div>
              </aside>

              <header style={styles.topBar}>
                <button style={styles.topBtn} onClick={() => setActivePanel(activePanel === "left" ? null : "left")}>☰</button>
                <input 
                  style={styles.titleInput} 
                  value={projectTitle} 
                  onChange={(e) => setProjectTitle(e.target.value)} 
                  placeholder="Untitled Manuscript"
                />
                <button style={styles.topBtn} onClick={saveSnapshot} title="Save Revision Snapshot">📸</button>
                <button style={styles.topBtn} onClick={() => setTheme(isDark ? "light" : "dark")}>{isDark ? "☀️" : "🌙"}</button>
                <button style={styles.topBtn} onClick={() => setActivePanel(activePanel === "right" ? null : "right")}>
                  ⚠️ {spellIssues.length > 0 && <span style={{ fontSize: 12, background: "#d9534f", color: "#fff", borderRadius: "50%", padding: "2px 6px", marginRight: 4 }}>{spellIssues.length}</span>}
                </button>
              </header>

              <div style={styles.statsBar}>
                <div><strong>Words:</strong> {wordCount}</div>
                <div><strong>Print Pages (6x9):</strong> {pageCount}</div>
                <div><strong>KDP Spine:</strong> {spineInches.toFixed(4)}"</div>
                <div style={{ color: audioState.playing ? "#c8a96e" : "inherit" }}>
                  <strong>Soundscape:</strong> {audioState.playing ? `🎼 ${currentTrack.title} (${audioState.mood})` : "Muted"}
                </div>
              </div>

              <main style={{ flex: 1, display: "flex", flexDirection: "column", overflow: "hidden" }}>
                {activeView === "editor" && (
                  <div style={styles.editorWrap}>
                    <div style={styles.paperSheet} onMouseUp={handleMouseUp}>
                      <textarea
                        ref={editorRef}
                        style={styles.textarea}
                        value={content}
                        onChange={(e) => { setContent(e.target.value); handleTyping(); }}
                        placeholder="Begin your story here..."
                      />
                    </div>
                  </div>
                )}

                {activeView === "cover" && (
                  <div style={styles.coverWrap}>
                    <div style={styles.coverCanvas}>
                      <div style={styles.coverBack}>
                        <div style={{ fontSize: 12, opacity: 0.8, fontStyle: "italic" }}>Back Cover (Verso)</div>
                        <p style={{ fontSize: 13, lineHeight: 1.6, textAlign: "justify", margin: 0 }}>{backText}</p>
                        <div style={{ background: "#fff", width: 80, height: 50, display: "flex", alignItems: "center", justifyContent: "center", color: "#000", fontSize: 9, fontWeight: "bold" }}>ISBN BARCODE</div>
                      </div>

                      <div style={styles.coverSpine}>
                        <div style={styles.spineText}>{coverTitle} &nbsp;•&nbsp; {coverAuthor}</div>
                      </div>

                      <div style={styles.coverFront}>
                        <div>
                          <div style={{ fontSize: 11, tracking: 2, textTransform: "uppercase", opacity: 0.8, marginBottom: 8 }}>Fiction</div>
                          <h1 style={{ fontSize: 26, margin: "12px 0 4px 0", fontFamily: "'Georgia', serif", fontWeight: "normal", letterSpacing: "1px" }}>{coverTitle}</h1>
                          <div style={{ fontSize: 12, fontStyle: "italic", opacity: 0.9 }}>{coverSubtitle}</div>
                        </div>
                        <div style={{ fontWeight: "bold", fontSize: 14, letterSpacing: "2px", textTransform: "uppercase" }}>{coverAuthor}</div>
                      </div>
                    </div>

                    <div style={styles.coverInputGroup}>
                      <div style={{ fontSize: 12, fontWeight: "bold", textTransform: "uppercase", color: "#8a7a62" }}>Cover Customization Canvas</div>
                      <input style={styles.inputField} value={coverTitle} onChange={(e) => setCoverTitle(e.target.value.toUpperCase())} placeholder="Front & Spine Title" />
                      <input style={styles.inputField} value={coverSubtitle} onChange={(e) => setCoverSubtitle(e.target.value)} placeholder="Subtitle" />
                      <input style={styles.inputField} value={coverAuthor} onChange={(e) => setCoverAuthor(e.target.value)} placeholder="Author Print Name" />
                      <textarea style={{...styles.inputField, minHeight: 60}} value={backText} onChange={(e) => setBackText(e.target.value)} placeholder="Back Cover Description Blurb" />
                      <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
                        <span style={{ fontSize: 13 }}>Palette:</span>
                        {["#1a1a2e", "#2e1a1a", "#1a2e1a", "#111"].map((c) => (
                          <button key={c} onClick={() => setCoverBg(c)} style={{ width: 28, height: 28, borderRadius: "50%", background: c, border: coverBg === c ? "2px solid #c8a96e" : "1px solid rgba(255,255,255,0.2)", cursor: "pointer" }} />
                        ))}
                        <button onClick={() => alert("Photo Upload requires native wrapper permission configuration.")} style={{ marginLeft: "auto", padding: "6px 12px", borderRadius: 6, fontSize: 12, background: "none", border: "1px solid #8a7a62", color: "inherit", cursor: "pointer" }}>🖼️ Upload Art</button>
                      </div>
                    </div>
                  </div>
                )}

                {activeView === "history" && (
                  <div style={{ padding: 24, overflowY: "auto", flex: 1 }}>
                    <div style={{ maxWidth: 600, margin: "0 auto" }}>
                      <h3 style={{ fontFamily: "sans-serif", letterSpacing: "0.5px" }}>Local Revision Snapshots</h3>
                      <p style={{ fontSize: 13, color: "#8a7a62" }}>Track points saved explicitly by your snapshot controls.</p>
                      {(() => {
                        const proj = projects.find(p => p.id === currentProjectId);
                        if (!proj || !proj.history || proj.history.length === 0) {
                          return <div style={{ textAlign: "center", padding: 32, opacity: 0.5 }}>No revision commits stored for this project yet.</div>;
                        }
                        return proj.history.map((snap, i) => (
                          <div key={i} style={{ ...styles.listItem, background: isDark ? "#141210" : "#fff", borderRadius: 8, marginBottom: 8, border: "1px solid rgba(0,0,0,0.05)" }}>
                            <div>
                              <div style={{ fontWeight: "bold", fontSize: 13 }}>Commit Revision #{i+1}</div>
                              <div style={{ fontSize: 11, opacity: 0.6 }}>{new Date(snap.ts).toLocaleTimeString()} — {snap.wordCount} words</div>
                            </div>
                            <button 
                              onClick={() => restoreSnapshot(snap)}
                              style={{ padding: "6px 12px", borderRadius: 6, background: "#8b6914", color: "#fff", border: "none", fontSize: 12, fontWeight: "bold", cursor: "pointer" }}
                            >
                              Restore
                            </button>
                          </div>
                        ));
                      })()}
                    </div>
                  </div>
                )}

                {activeView === "audio" && (
                  <div style={{ padding: 24, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", flex: 1 }}>
                    <div style={{ maxWidth: 400, width: "100%", background: isDark ? "#141210" : "#fff", padding: 24, borderRadius: 16, textAlign: "center", boxShadow: "0 8px 32px rgba(0,0,0,0.15)" }}>
                      <div style={{ fontSize: 48, marginBottom: 16 }}>{audioState.playing ? "🎼" : "🔇"}</div>
                      <h3 style={{ margin: "0 0 8px 0" }}>Predictive Soundscape</h3>
                      <p style={{ fontSize: 13, color: "#8a7a62", margin: "0 0 24px 0" }}>Adapts classical orchestration profiles by parsing your real-time emotional writing pacing metrics.</p>
                      
                      <div style={{ padding: 16, background: isDark ? "#1e1c1a" : "#faf8f4", borderRadius: 12, marginBottom: 24 }}>
                        <div style={{ fontSize: 11, textTransform: "uppercase", letterSpacing: 1, color: "#c8a96e", marginBottom: 4 }}>Active Track Tracked</div>
                        <div style={{ fontWeight: "bold", fontSize: 15 }}>{currentTrack.title}</div>
                        <div style={{ fontSize: 12, opacity: 0.7 }}>{currentTrack.composer}</div>
                      </div>

                      <button 
                        onClick={toggleAudio}
                        style={{ width: "100%", padding: "14px", borderRadius: 12, background: audioState.playing ? "#d9534f" : "#8b6914", color: "#fff", border: "none", fontWeight: "bold", fontSize: 16, cursor: "pointer" }}
                      >
                        {audioState.playing ? "Pause Soundscape" : "Activate Immersive Audio"}
                      </button>
                    </div>
                  </div>
                )}
              </main>

              {floatingMenu && (
                <div style={{ ...styles.floatingToolbar, left: floatingMenu.x, top: floatingMenu.y }}>
                  <button style={styles.floatBtn} onClick={() => applyFormat("bold")}><b>B</b></button>
                  <button style={styles.floatBtn} onClick={() => applyFormat("italic")}><i>I</i></button>
                  <button style={styles.floatBtn} onClick={() => applyFormat("pagebreak")}>Saut</button>
                  <button style={{ ...styles.floatBtn, borderRight: "none" }} onClick={() => applyFormat("footnote")}>Note</button>
                </div>
              )}

              <nav style={styles.bottomNav}>
                <button style={{ ...styles.navBtn, ...(activeView === "editor" ? styles.navBtnActive : {}) }} onClick={() => setActiveView("editor")}>
                  <span>📝</span>
                  <span style={styles.navLabel}>Write</span>
                </button>
                <button style={{ ...styles.navBtn, ...(activeView === "cover" ? styles.navBtnActive : {}) }} onClick={() => setActiveView("cover")}>
                  <span>🖼️</span>
                  <span style={styles.navLabel}>Cover</span>
                </button>
                <button style={{ ...styles.navBtn, ...(activeView === "history" ? styles.navBtnActive : {}) }} onClick={() => setActiveView("history")}>
                  <span>📜</span>
                  <span style={styles.navLabel}>History</span>
                </button>
                <button style={{ ...styles.navBtn, ...(activeView === "audio" ? styles.navBtnActive : {}) }} onClick={() => setActiveView("audio")}>
                  <span>🎧</span>
                  <span style={styles.navLabel}>Soundscape</span>
                </button>
              </nav>
            </div>
          );
        }

        // Montage de l'application dans le DOM
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<PublishReady />);
    </script>
</body>
</html>
