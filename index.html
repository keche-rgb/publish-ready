<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PublishReady — Studio d'Écriture</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@400;500;600&display=swap');

    /* ── VARIABLES MINIMALISTES ── */
    :root {
      --text-main: #202020;
      --text-muted: #6b6b6b;
      --bg-app: #f5f5f5;
      --bg-panel: #ffffff;
      --border: #e0e0e0;
      --accent: #000000;
      --radius: 6px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg-app);
      color: var(--text-main);
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      -webkit-font-smoothing: antialiased;
    }

    /* ── TOP BAR (DESKTOP) ── */
    #topbar {
      background: var(--bg-panel);
      display: flex; align-items: center; padding: 0 20px; height: 50px; gap: 12px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0; z-index: 10;
    }
    #topbar .logo {
      font-weight: 600; color: var(--text-main); margin-right: 20px; font-size: 0.95rem;
    }
    .tb-btn {
      background: transparent; border: 1px solid var(--border); color: var(--text-main);
      padding: 6px 12px; border-radius: var(--radius); cursor: pointer; font-size: 0.8rem;
    }
    .tb-btn:hover { background: #f0f0f0; }
    .tb-btn.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
    #topbar .spacer { flex: 1; }
    #word-count { font-size: 0.75rem; color: var(--text-muted); }

    /* ── LAYOUT PRINCIPAL ── */
    #main-container { display: flex; flex: 1; overflow: hidden; position: relative; }

    /* ── PANNEAU GAUCHE ── */
    #sidebar-left {
      width: 250px; background: var(--bg-panel); display: flex; flex-direction: column;
      border-right: 1px solid var(--border); overflow-y: auto;
    }
    .section-box { padding: 15px; border-bottom: 1px solid var(--border); }
    .section-label { font-size: 0.7rem; color: var(--text-muted); margin-bottom: 8px; font-weight: 600; text-transform: uppercase; }
    
    .custom-select {
      width: 100%; background: #fff; border: 1px solid var(--border); color: var(--text-main);
      padding: 6px 8px; border-radius: var(--radius); font-size: 0.8rem; outline: none;
    }
    .sidebar-btn {
      display: block; width: 100%; text-align: left; background: none; border: none;
      color: var(--text-main); padding: 8px; border-radius: var(--radius); cursor: pointer; font-size: 0.85rem; margin-top: 4px;
    }
    .sidebar-btn.active { background: #f0f0f0; font-weight: 500; }
    .sidebar-btn:hover:not(.active) { background: #f9f9f9; }

    /* ── ZONE D'ÉDITION ── */
    #workspace-area { flex: 1; overflow-y: auto; display: flex; flex-direction: column; align-items: center; padding: 40px 20px 100px; }
    #manuscript-wrapper { width: 100%; max-width: 700px; }
    .info-bar-top { text-align: center; margin-bottom: 20px; font-size: 0.7rem; color: var(--text-muted); }

    #paper-sheet {
      background: #ffffff; border: 1px solid var(--border); border-radius: var(--radius); padding: 60px 50px; min-height: 800px;
    }

    #input-book-title { font-family: 'Playfair Display', serif; font-size: 2rem; font-weight: 700; width: 100%; border: none; outline: none; text-align: center; color: var(--text-main); background: transparent; margin-bottom: 5px; }
    #input-book-author { font-family: 'Playfair Display', serif; font-size: 1rem; font-style: italic; width: 100%; border: none; outline: none; text-align: center; color: var(--text-muted); background: transparent; margin-bottom: 40px; }
    #input-chapter-title { font-family: 'Playfair Display', serif; font-size: 1.3rem; font-weight: 700; width: 100%; border: none; outline: none; color: var(--text-main); background: transparent; margin-bottom: 20px; }
    
    #main-editor {
      width: 100%; min-height: 500px; border: none; outline: none; resize: none;
      font-family: 'Times New Roman', Times, serif; font-size: 12pt; line-height: 2;
      color: var(--text-main); background: transparent;
    }

    /* ── PANNEAU DROIT ── */
    #sidebar-right {
      width: 280px; background: var(--bg-panel); display: flex; flex-direction: column; border-left: 1px solid var(--border);
    }
    .tab-header { display: flex; border-bottom: 1px solid var(--border); }
    .tab-link { flex: 1; padding: 12px 4px; border: none; background: none; font-size: 0.75rem; color: var(--text-muted); cursor: pointer; text-align: center; font-weight: 500; }
    .tab-link.active { color: var(--text-main); border-bottom: 2px solid var(--text-main); }
    
    .tab-pane { display: none; padding: 20px; flex: 1; overflow-y: auto; }
    .tab-pane.active { display: block; }

    /* ZONE COUVERTURE */
    #cover-viewport {
      width: 100%; aspect-ratio: 6/9; background: #eaeaea; color: var(--text-main);
      border: 1px solid var(--border); display: flex; flex-direction: column; align-items: center;
      padding: 20px; position: relative; overflow: hidden; background-size: cover; background-position: center;
    }
    .cover-actions { position: absolute; top: 10px; right: 10px; display: flex; gap: 4px; z-index: 5; }
    .btn-cover-src { background: #ffffff; border: 1px solid var(--border); color: var(--text-main); padding: 4px 8px; font-size: 0.65rem; cursor: pointer; }
    .btn-cover-src:hover { background: #f0f0f0; }
    
    #live-cover-title { font-family: 'Playfair Display', serif; font-size: 1.4rem; font-weight: 700; text-align: center; margin-top: auto; margin-bottom: 6px; background: rgba(255,255,255,0.8); padding: 2px 5px; }
    #live-cover-author { font-family: 'Playfair Display', serif; font-style: italic; font-size: 0.9rem; text-align: center; margin-bottom: auto; background: rgba(255,255,255,0.8); padding: 2px 5px;}
    .cover-footer-text { font-size: 0.55rem; color: var(--text-muted); text-align: center; margin-top: 10px; }

    /* ── POPUP FORMAT TEXTE ── */
    #format-popup {
      position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
      background: var(--bg-panel); color: var(--text-main); border: 1px solid var(--border); border-radius: var(--radius);
      padding: 20px; width: 280px; box-shadow: 0 4px 20px rgba(0,0,0,0.1);
      z-index: 110; display: none;
    }
    #format-popup.show { display: block; }
    .popup-title { font-size: 0.8rem; font-weight: 600; border-bottom: 1px solid var(--border); padding-bottom: 10px; margin-bottom: 15px; }
    .popup-field { margin-bottom: 12px; }
    .popup-field label { display: block; font-size: 0.7rem; color: var(--text-muted); margin-bottom: 4px; }
    .popup-field select { width: 100%; background: #fff; border: 1px solid var(--border); padding: 6px; border-radius: 4px; font-size: 0.8rem; }
    .popup-buttons { display: flex; gap: 8px; margin-top: 20px; }
    .btn-pop { flex: 1; padding: 8px; border: 1px solid var(--border); background: transparent; cursor: pointer; font-size: 0.8rem; }
    .btn-pop.apply { background: var(--accent); color: #fff; border-color: var(--accent); }
    .btn-pop.cancel:hover { background: #f0f0f0; }

    /* ── POPUP EXPORT ── */
    #export-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.2); z-index: 120; align-items: center; justify-content: center; }
    #export-overlay.show { display: flex; }
    .export-card { background: var(--bg-panel); padding: 25px; border-radius: var(--radius); border: 1px solid var(--border); width: 320px; text-align: center; }
    .export-actions { display: flex; flex-direction: column; gap: 8px; margin-top: 15px; }
    .btn-exp { padding: 10px; border: 1px solid var(--border); background: transparent; cursor: pointer; font-size: 0.8rem; }
    .btn-exp.dark { background: var(--text-main); color: #fff; border-color: var(--text-main); }
    .btn-exp:hover { opacity: 0.9; }

    /* ── NAVIGATION MOBILE ── */
    #mobile-bottom-bar {
      display: none; position: fixed; bottom: 0; left: 0; right: 0; height: 55px;
      background: var(--bg-panel); border-top: 1px solid var(--border);
      z-index: 100; justify-content: space-around; align-items: center;
    }
    .m-nav-item {
      background: none; border: none; color: var(--text-muted); font-size: 0.65rem;
      display: flex; flex-direction: column; align-items: center; gap: 2px; cursor: pointer; flex: 1;
    }
    .m-nav-item.active { color: var(--accent); font-weight: 600; }
    .m-nav-item .icon { font-size: 1.1rem; }

    /* ── RESPONSIVE MOBILE ── */
    @media (max-width: 900px) {
      #sidebar-left, #sidebar-right { display: none !important; }
      #mobile-bottom-bar { display: flex; }
      #topbar .tb-btn:not(.primary) { display: none; }

      body.view-format #format-popup { display: block; }
      body.view-ia #sidebar-right { display: flex !important; position: fixed; inset: 50px 0 55px 0; width: 100%; z-index: 95; }
      
      #workspace-area { padding: 20px 15px 80px; }
      #paper-sheet { padding: 20px 15px; border: none; }
    }
  </style>
</head>
<body class="view-ecrire">

  <div id="topbar">
    <div class="logo">PublishReady</div>
    <button class="tb-btn" onclick="alert('Nouveau Chapitre Créé')">Nouveau Chapitre</button>
    <button class="tb-btn" onclick="openFormat()">Format</button>
    <div class="spacer"></div>
    <span id="word-count">0 mots</span>
    <button class="tb-btn primary" onclick="toggleExport(true)">Exporter</button>
  </div>

  <div id="main-container">

    <div id="sidebar-left">
      <div class="section-box">
        <div class="section-label">Format de sortie</div>
        <select class="custom-select">
          <option>Amazon KDP (6×9 in)</option>
          <option>Édition Standard</option>
        </select>
      </div>
      <div class="section-box">
        <div class="section-label">Structure</div>
        <button class="sidebar-btn active">Chapitre Un</button>
      </div>
    </div>

    <div id="workspace-area">
      <div id="manuscript-wrapper">
        <div class="info-bar-top">Broché 6×9 po · Times New Roman 12pt · Interligne double</div>
        
        <div id="paper-sheet">
          <input id="input-book-title" type="text" placeholder="Titre du livre" value="Mon Livre" oninput="syncText()">
          <input id="input-book-author" type="text" placeholder="Nom de l'auteur" value="Auteur" oninput="syncText()">
          
          <input id="input-chapter-title" type="text" placeholder="Chapitre Un" value="Chapitre Un">
          <textarea id="main-editor" placeholder="Commencez à écrire ici..." oninput="countWords()"></textarea>
        </div>
      </div>
    </div>

    <div id="sidebar-right">
      <div class="tab-header">
        <button class="tab-link active" id="btn-tab-cover" onclick="switchRightTab('cover')">Couverture</button>
        <button class="tab-link" id="btn-tab-ai" onclick="switchRightTab('ai')">Validation</button>
      </div>

      <div class="tab-pane active" id="pane-cover">
        <div id="cover-viewport">
          <div class="cover-actions">
            <button class="btn-cover-src" onclick="triggerFilePicker()">Galerie</button>
            <button class="btn-cover-src" onclick="triggerUrlPrompt()">URL</button>
          </div>
          <div id="live-cover-title">Mon Livre</div>
          <div id="live-cover-author">par Auteur</div>
        </div>
        <div class="cover-footer-text">Aperçu KDP (300 DPI)</div>
        <input type="file" id="hidden-file-input" accept="image/*" style="display: none;" onchange="loadLocalImage(event)">
      </div>

      <div class="tab-pane" id="pane-ai">
        <button class="tb-btn" style="width:100%; margin-bottom:15px;" onclick="alert('Vérification effectuée.')">Vérifier le document</button>
        <p style="font-size:0.75rem; color:var(--text-muted);">Format conforme aux standards KDP.</p>
      </div>
    </div>

  </div>

  <div id="format-popup">
    <div class="popup-title">Paramètres du texte</div>
    <div class="popup-field">
      <label>Police</label>
      <select id="f-family">
        <option value="'Times New Roman', Times, serif">Times New Roman</option>
        <option value="Georgia, serif">Georgia</option>
        <option value="Arial, sans-serif">Arial</option>
      </select>
    </div>
    <div class="popup-field">
      <label>Taille</label>
      <select id="f-size">
        <option value="12pt">12pt</option>
        <option value="11pt">11pt</option>
      </select>
    </div>
    <div class="popup-field">
      <label>Interligne</label>
      <select id="f-lineheight">
        <option value="2">Double</option>
        <option value="1.5">1.5</option>
        <option value="1.15">Simple</option>
      </select>
    </div>
    <div class="popup-buttons">
      <button class="btn-pop apply" onclick="applyFormatting()">Appliquer</button>
      <button class="btn-pop cancel" onclick="closeFormat()">Annuler</button>
    </div>
  </div>

  <div id="export-overlay">
    <div class="export-card">
      <h3 style="margin-bottom:15px; font-size:1rem;">Options d'exportation</h3>
      <div class="export-actions">
        <button class="btn-exp dark" onclick="alert('Création du PDF...')">PDF pour impression</button>
        <button class="btn-exp dark" onclick="alert('Création de l\'ePub...')">ePub (Numérique)</button>
        <button class="btn-exp" onclick="toggleExport(false)">Fermer</button>
      </div>
    </div>
  </div>

  <div id="mobile-bottom-bar">
    <button class="m-nav-item active" id="m-btn-ecrire" onclick="switchMobileView('ecrire')">
      <span class="icon">✍️</span><span>Écrire</span>
    </button>
    <button class="m-nav-item" id="m-btn-format" onclick="switchMobileView('format')">
      <span class="icon">Aa</span><span>Format</span>
    </button>
    <button class="m-nav-item" id="m-btn-ia" onclick="switchMobileView('ia')">
      <span class="icon">🖼️</span><span>Couverture</span>
    </button>
    <button class="m-nav-item" onclick="toggleExport(true)">
      <span class="icon">📥</span><span>Exporter</span>
    </button>
  </div>

  <script>
    function syncText() {
      const titleVal = document.getElementById('input-book-title').value;
      const authorVal = document.getElementById('input-book-author').value;
      document.getElementById('live-cover-title').innerText = titleVal || "Mon Livre";
      document.getElementById('live-cover-author').innerText = authorVal ? "par " + authorVal : "Auteur";
    }

    function countWords() {
      const text = document.getElementById('main-editor').value.trim();
      const count = text ? text.split(/\s+/).length : 0;
      document.getElementById('word-count').innerText = count + " mots";
    }

    function triggerFilePicker() { document.getElementById('hidden-file-input').click(); }
    function loadLocalImage(event) {
      const file = event.target.files[0];
      if (file) {
        const reader = new FileReader();
        reader.onload = function(e) { document.getElementById('cover-viewport').style.backgroundImage = `url('${e.target.result}')`; };
        reader.readAsDataURL(file);
      }
    }

    function triggerUrlPrompt() {
      const url = prompt("URL de l'image :");
      if (url) document.getElementById('cover-viewport').style.backgroundImage = `url('${url}')`;
    }

    function openFormat() { document.getElementById('format-popup').classList.add('show'); }
    function closeFormat() { document.getElementById('format-popup').classList.remove('show'); }
    
    function applyFormatting() {
      const editor = document.getElementById('main-editor');
      editor.style.fontFamily = document.getElementById('f-family').value;
      editor.style.fontSize = document.getElementById('f-size').value;
      editor.style.lineHeight = document.getElementById('f-lineheight').value;
      closeFormat();
      if(document.body.classList.contains('view-format')) switchMobileView('ecrire');
    }

    function switchRightTab(tab) {
      document.querySelectorAll('.tab-link').forEach(el => el.classList.remove('active'));
      document.querySelectorAll('.tab-pane').forEach(el => el.classList.remove('active'));
      if(tab === 'cover') {
        document.getElementById('btn-tab-cover').classList.add('active');
        document.getElementById('pane-cover').classList.add('active');
      } else {
        document.getElementById('btn-tab-ai').classList.add('active');
        document.getElementById('pane-ai').classList.add('active');
      }
    }

    function switchMobileView(view) {
      document.body.classList.remove('view-ecrire', 'view-format', 'view-ia');
      document.querySelectorAll('.m-nav-item').forEach(el => el.classList.remove('active'));
      closeFormat();

      if (view === 'ecrire') {
        document.body.classList.add('view-ecrire');
        document.getElementById('m-btn-ecrire').classList.add('active');
      } else if (view === 'format') {
        document.body.classList.add('view-format');
        document.getElementById('m-btn-format').classList.add('active');
        openFormat();
      } else if (view === 'ia') {
        document.body.classList.add('view-ia');
        document.getElementById('m-btn-ia').classList.add('active');
        switchRightTab('cover');
      }
    }

    function toggleExport(show) { document.getElementById('export-overlay').style.display = show ? 'flex' : 'none'; }
  </script>
</body>
</html>
