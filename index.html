<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PublishReady — Professional Book Writing Studio</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;500;600&family=Courier+Prime:ital@0;1&display=swap');

  /* ── VARIABLES PREMIUM MODERNISÉES ── */
  :root {
    --ink: #161512;
    --paper: #fcfbfa;
    --cream: #f4eff2;
    --gold: #c5a059;
    --gold-light: #e5c483;
    --muted: #8a8279;
    --rule: rgba(0, 0, 0, 0.06);
    --border-dark: rgba(255, 255, 255, 0.08);
    --bg-sidebar: #1c1a16;
    --red: #d9534f;
    --green: #2ecc71;
    --sidebar-w: 280px;
    --radius-sm: 4px;
    --radius-md: 12px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Inter', sans-serif;
    background: #eadecb; /* Arrière-plan adouci pour faire ressortir la feuille */
    color: var(--ink);
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    -webkit-font-smoothing: antialiased;
  }

  /* ── TOP BAR (STYLE BARRE D'OUTILS PRO) ── */
  #topbar {
    background: var(--ink);
    color: var(--paper);
    display: flex;
    align-items: center;
    padding: 0 24px;
    height: 56px;
    gap: 12px;
    flex-shrink: 0;
    border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    box-shadow: 0 4px 20px rgba(0,0,0,0.2);
    z-index: 10;
  }
  #topbar .logo {
    font-family: 'Playfair Display', serif;
    font-size: 1.25rem;
    font-weight: 700;
    color: var(--gold-light);
    letter-spacing: 0.02em;
    margin-right: 20px;
  }
  .tb-btn {
    background: rgba(255, 255, 255, 0.03);
    border: 1px solid var(--border-dark);
    color: #e0e0e0;
    padding: 7px 14px;
    border-radius: var(--radius-sm);
    cursor: pointer;
    font-size: 0.8rem;
    font-weight: 500;
    font-family: 'Inter', sans-serif;
    transition: all .2s ease;
    white-space: nowrap;
  }
  .tb-btn:hover { 
    background: rgba(255, 255, 255, 0.08); 
    border-color: var(--gold); 
    color: var(--paper); 
  }
  .tb-btn.primary { 
    background: linear-gradient(135deg, var(--gold-light), var(--gold)); 
    border: none; 
    color: #121212; 
    font-weight: 600;
    box-shadow: 0 2px 10px rgba(197, 160, 89, 0.2);
  }
  .tb-btn.primary:hover { 
    transform: translateY(-1px);
    box-shadow: 0 4px 15px rgba(197, 160, 89, 0.3);
  }
  #topbar .spacer { flex: 1; }
  #word-count { font-size: 0.78rem; color: var(--muted); font-weight: 500; }

  /* ── MAIN LAYOUT ── */
  #main { display: flex; flex: 1; overflow: hidden; position: relative; }

  /* ── SIDEBAR GAUSSIAN BLUR ── */
  #sidebar {
    width: var(--sidebar-w);
    background: var(--bg-sidebar);
    color: var(--paper);
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
    overflow-y: auto;
    border-right: 1px solid rgba(255, 255, 255, 0.03);
  }
  .sidebar-section { padding: 20px 18px 10px; }
  .sidebar-label {
    font-size: 0.68rem;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 12px;
    font-weight: 600;
    opacity: 0.9;
  }
  .sidebar-btn {
    display: block;
    width: 100%;
    text-align: left;
    background: none;
    border: none;
    color: #b3aea6;
    padding: 9px 12px;
    border-radius: var(--radius-sm);
    cursor: pointer;
    font-size: 0.85rem;
    font-family: 'Inter', sans-serif;
    transition: all .2s;
    margin-bottom: 4px;
  }
  .sidebar-btn:hover { background: rgba(255, 255, 255, 0.04); color: var(--paper); }
  .sidebar-btn.active { background: rgba(197, 160, 89, 0.1); color: var(--gold-light); font-weight: 500; }

  .format-group { padding: 16px 18px; border-top: 1px solid rgba(255, 255, 255, 0.03); }
  .format-group label { font-size: 0.75rem; color: #9c968e; display: block; margin-bottom: 6px; }
  
  /* Inputs & Selects Pro */
  .format-group select, #pub-standard {
    width: 100%;
    background: rgba(255, 255, 255, 0.04);
    border: 1px solid rgba(255, 255, 255, 0.08);
    color: var(--paper);
    padding: 8px 12px;
    border-radius: var(--radius-sm);
    font-size: 0.82rem;
    margin-bottom: 12px;
    font-family: 'Inter', sans-serif;
    outline: none;
    transition: border-color 0.2s;
  }
  .format-group select:focus, #pub-standard:focus { border-color: var(--gold); }
  
  .format-row { display: flex; gap: 8px; margin-bottom: 6px; }
  .fmt-mini {
    flex: 1;
    background: rgba(255, 255, 255, 0.04);
    border: 1px solid rgba(255, 255, 255, 0.08);
    color: #e0e0e0;
    padding: 8px;
    border-radius: var(--radius-sm);
    font-size: 0.8rem;
    font-family: 'Inter', sans-serif;
    text-align: center;
    cursor: pointer;
    transition: all .2s;
  }
  .fmt-mini:hover { background: rgba(255, 255, 255, 0.08); }
  .fmt-mini.active { background: var(--gold); border-color: var(--gold); color: #121212; font-weight: 600; }

  /* ── EDITOR AREA (FEUILLE REALISTE) ── */
  #editor-area {
    flex: 1;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 48px 24px;
    scrollbar-width: thin;
  }

  #page-container { width: 100%; max-width: 720px; }

  .page-meta {
    text-align: center;
    margin-bottom: 24px;
    font-size: 0.75rem;
    font-weight: 500;
    color: #6b6357;
    letter-spacing: 0.03em;
    background: rgba(0, 0, 0, 0.04);
    padding: 6px 16px;
    border-radius: 20px;
    display: inline-block;
    left: 50%;
    transform: translateX(-50%);
    position: relative;
  }

  /* Rendu livre papier premium */
  #editor-frame {
    background: var(--paper);
    box-shadow: 0 10px 40px rgba(0,0,0,0.06), 0 1px 3px rgba(0,0,0,0.05), inset 0 0 0 1px rgba(0,0,0,0.02);
    border-radius: 4px;
    padding: 90px 96px;
    min-height: 1000px;
    position: relative;
  }

  #book-title-input {
    font-family: 'Playfair Display', serif;
    font-size: 2.4rem;
    font-weight: 700;
    width: 100%;
    border: none;
    outline: none;
    text-align: center;
    color: var(--ink);
    background: transparent;
    margin-bottom: 12px;
    line-height: 1.2;
    letter-spacing: -0.01em;
  }
  #book-author-input {
    font-family: 'Playfair Display', serif;
    font-size: 1.1rem;
    font-style: italic;
    width: 100%;
    border: none;
    outline: none;
    text-align: center;
    color: var(--muted);
    background: transparent;
    margin-bottom: 48px;
  }

  .chapter-title-input {
    font-family: 'Playfair Display', serif;
    font-size: 1.5rem;
    font-weight: 700;
    width: 100%;
    border: none;
    border-bottom: 1px solid rgba(0,0,0,0.08);
    outline: none;
    color: var(--ink);
    background: transparent;
    padding-bottom: 12px;
    margin-bottom: 24px;
    margin-top: 40px;
  }

  #main-editor {
    font-family: 'Times New Roman', Times, serif;
    font-size: 12pt;
    line-height: 2;
    width: 100%;
    min-height: 600px;
    border: none;
    outline: none;
    resize: none;
    color: var(--ink);
    background: transparent;
    word-spacing: 0.05em;
    text-align: left;
  }

  /* ── RIGHT PANEL (GLASSMORPHISM) ── */
  #right-panel {
    width: 320px;
    background: rgba(252, 251, 250, 0.85);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-left: 1px solid rgba(0, 0, 0, 0.05);
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
    overflow-y: auto;
    z-index: 5;
  }
  .panel-tab-bar {
    display: flex;
    border-bottom: 1px solid rgba(0, 0, 0, 0.05);
    background: rgba(0,0,0,0.02);
  }
  .panel-tab {
    flex: 1;
    padding: 14px 6px;
    text-align: center;
    font-size: 0.75rem;
    font-weight: 600;
    letter-spacing: 0.04em;
    cursor: pointer;
    color: var(--muted);
    border: none;
    background: none;
    border-bottom: 2px solid transparent;
    transition: all .2s ease;
    font-family: 'Inter', sans-serif;
  }
  .panel-tab:hover { color: var(--ink); }
  .panel-tab.active { color: var(--gold); border-bottom-color: var(--gold); background: var(--paper); }
  .panel-content { display: none; padding: 20px; flex: 1; }
  .panel-content.active { display: block; }

  /* Boutons IA Pro */
  .ai-btn {
    width: 100%;
    padding: 12px;
    background: var(--ink);
    color: var(--gold-light);
    border: none;
    border-radius: var(--radius-sm);
    font-family: 'Inter', sans-serif;
    font-weight: 500;
    font-size: 0.85rem;
    cursor: pointer;
    margin-bottom: 10px;
    transition: all .2s;
    box-shadow: 0 2px 8px rgba(0,0,0,0.15);
  }
  .ai-btn:hover { background: #262420; transform: translateY(-1px); }
  .ai-btn:disabled { opacity: 0.5; cursor: not-allowed; }
  
  #ai-result {
    background: var(--paper);
    border: 1px solid rgba(0,0,0,0.06);
    border-radius: var(--radius-sm);
    padding: 16px;
    font-size: 0.85rem;
    line-height: 1.6;
    min-height: 150px;
    color: var(--ink);
    box-shadow: inset 0 1px 3px rgba(0,0,0,0.02);
  }

  /* SECTION COUVERTURE AVANCÉE */
  #cover-panel select, #cover-panel input[type=text] {
    width: 100%;
    padding: 10px 12px;
    border: 1px solid rgba(0,0,0,0.08);
    border-radius: var(--radius-sm);
    font-size: 0.85rem;
    font-family: 'Inter', sans-serif;
    margin-bottom: 14px;
    background: var(--paper);
    outline: none;
  }
  #cover-panel select:focus, #cover-panel input[type=text]:focus { border-color: var(--gold); }
  #cover-panel label { font-size: 0.72rem; color: var(--muted); display: block; margin-bottom: 5px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; }
  
  #cover-preview {
    width: 100%;
    aspect-ratio: 6/9;
    border-radius: 6px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 30px 20px;
    margin-bottom: 20px;
    position: relative;
    overflow: hidden;
    box-shadow: 0 15px 35px rgba(0,0,0,0.2);
    transition: transform 0.3s cubic-bezier(0.165, 0.84, 0.44, 1);
  }
  #cover-preview:hover { transform: scale(1.02); }
  #cover-preview .cover-title { font-family: 'Playfair Display', serif; font-size: 1.5rem; font-weight: 700; margin-bottom: 10px; z-index: 2; }
  #cover-preview .cover-author { font-family: 'Playfair Display', serif; font-style: italic; font-size: 0.9rem; z-index: 2; }
  #cover-preview .cover-genre { font-size: 0.65rem; letter-spacing: 0.15em; text-transform: uppercase; margin-top: auto; z-index: 2; font-weight: 600; opacity: 0.8; }
  #cover-preview .cover-bg { position: absolute; inset: 0; opacity: 0.12; font-size: 7rem; display: flex; align-items: center; justify-content: center; z-index: 1; pointer-events: none;}

  /* VALIDATION MODERNE */
  .val-item { display: flex; align-items: flex-start; gap: 10px; padding: 12px 0; border-bottom: 1px solid var(--rule); font-size: 0.82rem; }
  .val-icon { font-size: 1.1rem; flex-shrink: 0; }
  .val-text { color: var(--muted); line-height: 1.4; }
  .val-score { text-align: center; padding: 20px 0; border-bottom: 1px solid var(--rule); margin-bottom: 10px; }
  .val-score .score-num { font-size: 3rem; font-weight: 700; color: var(--gold); font-family: 'Playfair Display', serif; }

  /* EXPORT MODAL */
  #modal-overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(22, 21, 18, 0.4);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    z-index: 100;
    align-items: center;
    justify-content: center;
    transition: all 0.3s;
  }
  #modal-overlay.open { display: flex; }
  #modal {
    background: var(--paper);
    border-radius: var(--radius-md);
    padding: 40px;
    max-width: 500px;
    width: 90%;
    text-align: center;
    box-shadow: 0 30px 60px rgba(0,0,0,0.25), 0 0 0 1px rgba(0,0,0,0.03);
    transform: translateY(20px);
    transition: transform 0.3s;
  }
  #modal-overlay.open #modal { transform: translateY(0); }
  #modal h2 { font-family: 'Playfair Display', serif; font-size: 1.75rem; margin-bottom: 12px; font-weight: 700; }
  #modal p { font-size: 0.9rem; color: var(--muted); margin-bottom: 28px; line-height: 1.6; }
  .modal-actions { display: flex; gap: 12px; justify-content: center; flex-direction: column; }
  .modal-btn {
    padding: 12px 24px;
    border-radius: var(--radius-sm);
    font-size: 0.88rem;
    cursor: pointer;
    border: none;
    font-family: 'Inter', sans-serif;
    font-weight: 600;
    transition: all .2s;
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }
  .modal-btn.dark { background: var(--ink); color: var(--gold-light); }
  .modal-btn.dark:hover { background: #262420; }
  .modal-btn.outline { background: transparent; border: 1px solid rgba(0,0,0,0.08); color: var(--ink); }
  .modal-btn.outline:hover { background: rgba(0,0,0,0.02); }

  /* STATUS BAR */
  .status-bar {
    background: var(--ink);
    color: #7a7369;
    font-size: 0.7rem;
    padding: 6px 24px;
    display: flex;
    gap: 24px;
    flex-shrink: 0;
    letter-spacing: 0.04em;
    border-top: 1px solid rgba(255,255,255,0.03);
  }
  .status-bar span { color: var(--gold-light); font-weight: 500; }

  /* ── CONTEXTE MOBILE (PATCH INTEGRÉ) ── */
  @media (max-width: 768px) {
    #sidebar, #right-panel { display: none; }
    #topbar .logo { font-size: 1.1rem; }
    #editor-frame { padding: 40px 24px; min-height: auto; }
    #book-title-input { font-size: 1.8rem; }
    #main-editor { font-size: 11
